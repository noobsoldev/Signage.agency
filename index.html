<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAMS Designs’s Price Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step-transition {
            transition: all 0.3s ease-in-out;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .tooltip {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 240px;
            background-color: #0f172a;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 12px;
            position: absolute;
            z-index: 100;
            bottom: 140%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 12px;
            font-weight: 400;
            line-height: 1.5;
            pointer-events: none;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tooltip .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: #0f172a transparent transparent transparent;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
            bottom: 150%;
        }

        /* Adjust tooltip for right-aligned icons to prevent clipping */
        .dropdown-option .tooltip .tooltiptext {
            left: auto;
            right: -10px;
            transform: none;
        }
        .dropdown-option .tooltip .tooltiptext::after {
            left: auto;
            right: 14px;
            transform: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div id="app" class="w-full max-w-[780px]">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">UAMS Designs</h1>
            <p class="text-slate-500 mt-2">Professional Price Estimation Tool</p>
        </div>

        <!-- Main Card -->
        <div id="main-card" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 min-h-[400px] flex flex-col relative">
            <!-- Live Data Badge -->
            <div class="absolute top-4 left-4 flex items-center space-x-2">
                <div class="flex items-center space-x-1.5 px-2 py-1 bg-emerald-50 border border-emerald-100 rounded-full">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">Live Sync</span>
                </div>
                <button onclick="init()" class="p-1.5 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors shadow-sm group" title="Sync with Google Sheets">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-slate-400 group-hover:text-blue-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
            <!-- Content will be injected here -->
            <div id="content" class="fade-in flex-grow">
                <div class="flex flex-col items-center justify-center h-full py-12">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    <p class="mt-4 text-slate-600">Loading pricing data...</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-400 text-sm mt-8">
            &copy; 2026 UAMS Design Pvt. Ltd. All prices are estimates.
        </p>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        // Configuration
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1LkQe5VsUnYLWqpxyFXG8Up0KifUeR-fxrHJS5CmsmQ4/gviz/tq?tqx=out:csv&gid=0';

        // State
        let state = {
            mode: 'landing',
            step: 1,
            data: {
                printing: []
            },
            selections: {},
            result: null
        };

        // UI Elements
        const contentEl = document.getElementById('content');

        // Initialization
        const PRINT_TYPE_INFO = {
            'Solvent': 'High-durability, weather-resistant printing using solvent-based inks. Ideal for outdoor banners and vehicle wraps.',
            'Eco Solvent': 'A more environmentally friendly version of solvent printing with lower VOCs. Great for indoor/outdoor signage.',
            'Latex': 'Water-based, odorless inks that are scratch-resistant and highly flexible. Perfect for wall coverings and banners.',
            'UV': 'Inks are cured instantly by UV light, allowing for printing on a wide variety of rigid and flexible substrates with high detail.'
        };

        async function init() {
            try {
                const pData = await fetchCSV(SHEET_URL);
                state.data.printing = parsePrintingData(pData);
                renderLanding();
            } catch (error) {
                console.error(error);
                renderError("Unable to load pricing data. Please try again.");
            }
        }

        function renderLanding() {
            state.mode = 'landing';
            render(`
                <div class="flex flex-col items-center text-center py-6 fade-in">
                    <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mb-8 shadow-xl shadow-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                    </div>
                    
                    <h2 class="text-4xl font-black text-slate-900 mb-4 tracking-tight">Welcome to UAMS Designs</h2>
                    <p class="text-lg text-slate-600 mb-10 max-w-xl leading-relaxed">
                        India’s pioneer multi-layered brand factory. We design, print, fabricate and install your brand promotional endeavors in-house.
                    </p>
                    
                    <div class="w-full mb-12">
                        <div class="bg-blue-50 p-8 rounded-3xl border border-blue-100 text-left flex flex-col sm:flex-row items-center gap-6">
                            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center shrink-0 shadow-lg shadow-blue-200">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-slate-900 mb-2">Signage Price Calculator</h3>
                                <p class="text-slate-600 leading-relaxed">
                                    Get instant, accurate estimates for custom printing and signage. Our tool uses real-time pricing data to provide professional quotes in seconds.
                                </p>
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="renderHome()" class="w-full sm:w-auto px-12 py-5 bg-blue-600 text-white font-black uppercase tracking-widest text-sm rounded-2xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 flex items-center justify-center group">
                        Start Price Estimation
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-3 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                        </svg>
                    </button>
                    
                    <p class="mt-8 text-slate-400 text-xs font-medium uppercase tracking-widest">
                        Trusted by industry leaders across India
                    </p>
                </div>
            `);
        }

        // CSV Fetching
        async function fetchCSV(url) {
            // Add cache busting
            const cacheBuster = `&t=${Date.now()}`;
            const response = await fetch(url + cacheBuster);
            if (!response.ok) throw new Error('Network response was not ok');
            const text = await response.text();
            return parseCSV(text);
        }

        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        currentField += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        currentRow.push(currentField);
                        currentField = '';
                    } else if (char === '\n' || char === '\r') {
                        if (char === '\r' && nextChar === '\n') i++;
                        currentRow.push(currentField);
                        rows.push(currentRow);
                        currentRow = [];
                        currentField = '';
                    } else {
                        currentField += char;
                    }
                }
            }
            if (currentRow.length > 0 || currentField !== '') {
                currentRow.push(currentField);
                rows.push(currentRow);
            }
            return rows;
        }

        // Data Parsing
        function parsePrintingData(rows) {
            // Skip header (first row)
            // The new sheet has 2 empty columns at the start
            return rows.slice(1).map(row => {
                // Adjusting indices for the new sheet structure (shifted by 2)
                const product = (row[2] || '').trim();
                const ratesStr = row[8] || '';
                const rates = ratesStr.split('/').map(r => parseFloat(r.trim())).filter(r => !isNaN(r));
                
                return {
                    product: product,
                    solvent: (row[3] || '').toUpperCase().includes('YES'),
                    ecoSolvent: (row[4] || '').toUpperCase().includes('YES'),
                    latex: (row[5] || '').toUpperCase().includes('YES'),
                    uv: (row[6] || '').toUpperCase().includes('YES'),
                    rateSqft: rates,
                    rateSqinch: row[9] ? parseFloat(row[9]) : null
                };
            }).filter(p => p.product && p.product !== 'PRODUCT');
        }

        // Rendering Logic
        function render(html) {
            contentEl.innerHTML = html;
        }

        function renderError(msg) {
            render(`
                <div class="flex flex-col items-center justify-center h-full py-12 text-center">
                    <div class="bg-red-50 text-red-600 p-4 rounded-lg border border-red-100 mb-6">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <p class="font-medium">${msg}</p>
                    </div>
                    <button onclick="location.reload()" class="px-6 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition-colors">
                        Try Again
                    </button>
                </div>
            `);
        }

        function renderStepHeader(current, total) {
            return `
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Step ${current} of ${total}</span>
                        <button onclick="goBack()" class="text-xs font-medium text-blue-600 hover:text-blue-700">Back</button>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-blue-600 h-full transition-all duration-500" style="width: ${(current/total)*100}%"></div>
                    </div>
                </div>
            `;
        }

        function renderHome() {
            renderPrintingStep1();
        }

        // Flow Management
        function startFlow(mode) {
            state.mode = mode;
            state.step = 1;
            renderPrintingStep1();
        }

        function goBack() {
            if (state.step === 1) {
                renderLanding();
            } else {
                state.step--;
                if (state.step === 1) renderPrintingStep1();
                else if (state.step === 2) renderPrintingStep2();
                else if (state.step === 3) renderPrintingStep3();
            }
        }

        // --- PRINTING FLOW ---

        function renderPrintingStep1() {
            state.step = 1;
            const products = state.data.printing.map(p => p.product);
            const selectedProduct = state.selections.product || '';
            
            render(`
                ${renderStepHeader(1, 4)}
                <h2 class="text-2xl font-bold text-slate-900 mb-6">Select Product</h2>
                <div class="space-y-4">
                    <div class="relative">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Product Name</label>
                        <div class="relative">
                            <input 
                                type="text" 
                                id="product-search" 
                                placeholder="Type to search product..." 
                                value="${selectedProduct}"
                                oninput="filterProducts(this.value)"
                                onfocus="showProductDropdown()"
                                autocomplete="off"
                                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all pr-20"
                            >
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center space-x-2">
                                ${selectedProduct ? `
                                    <button onclick="clearProductSearch()" class="p-1 hover:bg-slate-200 rounded-full transition-colors text-slate-400">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                ` : ''}
                                <div class="text-slate-400 pointer-events-none">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                        
                        <div id="product-dropdown" class="hidden absolute z-50 w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-xl max-h-60 overflow-y-auto fade-in">
                            ${products.map(p => `
                                <div onclick="selectProduct('${p.replace(/'/g, "\\'")}')" class="p-4 hover:bg-blue-50 cursor-pointer border-b border-slate-50 last:border-0 product-option">
                                    <span class="text-slate-700">${p}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <button id="next-btn" onclick="nextPrintingStep1()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200 disabled:opacity-50 disabled:cursor-not-allowed" ${!selectedProduct ? 'disabled' : ''}>
                        Next
                    </button>
                </div>
            `);

            // Close dropdown when clicking outside
            document.addEventListener('click', function(e) {
                const pDropdown = document.getElementById('product-dropdown');
                const pSearchInput = document.getElementById('product-search');
                if (pDropdown && pSearchInput && !pDropdown.contains(e.target) && e.target !== pSearchInput) {
                    pDropdown.classList.add('hidden');
                }

                const cDropdown = document.getElementById('color-dropdown');
                const cSearchInput = document.getElementById('color-search');
                if (cDropdown && cSearchInput && !cDropdown.contains(e.target) && e.target !== cSearchInput) {
                    cDropdown.classList.add('hidden');
                }
            });
        }

        function clearProductSearch() {
            state.selections.product = '';
            renderPrintingStep1();
        }

        function showProductDropdown() {
            const dropdown = document.getElementById('product-dropdown');
            if (dropdown) dropdown.classList.remove('hidden');
        }

        function filterProducts(val) {
            const dropdown = document.getElementById('product-dropdown');
            const options = dropdown.querySelectorAll('.product-option');
            const nextBtn = document.getElementById('next-btn');
            let hasVisible = false;

            val = val.toLowerCase();
            options.forEach(opt => {
                const text = opt.textContent.toLowerCase();
                if (text.includes(val)) {
                    opt.classList.remove('hidden');
                    hasVisible = true;
                } else {
                    opt.classList.add('hidden');
                }
            });

            dropdown.classList.toggle('hidden', !hasVisible);
            
            // If the value matches exactly one product, we can enable the button
            const exactMatch = state.data.printing.find(p => p.product.toLowerCase() === val);
            if (exactMatch) {
                state.selections.product = exactMatch.product;
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = true;
            }
        }

        function selectProduct(p) {
            state.selections.product = p;
            const searchInput = document.getElementById('product-search');
            const dropdown = document.getElementById('product-dropdown');
            const nextBtn = document.getElementById('next-btn');
            
            if (searchInput) searchInput.value = p;
            if (dropdown) dropdown.classList.add('hidden');
            if (nextBtn) nextBtn.disabled = false;
        }

        function nextPrintingStep1() {
            const product = state.selections.product;
            if (!product) return;
            
            const pObj = state.data.printing.find(p => p.product === product);
            if (!pObj) return;

            const availableTypes = [];
            if (pObj.solvent) availableTypes.push('Solvent');
            if (pObj.ecoSolvent) availableTypes.push('Eco Solvent');
            if (pObj.latex) availableTypes.push('Latex');
            if (pObj.uv) availableTypes.push('UV');

            if (availableTypes.length > 0) {
                renderPrintingStep2(availableTypes);
            } else {
                state.selections.printType = null;
                renderPrintingStep3();
            }
        }

        function renderPrintingStep2(availableTypes) {
            state.step = 2;
            const selectedType = state.selections.printType;
            
            if (!availableTypes) {
                availableTypes = getAvailablePrintTypes(state.selections.product);
            }
            
            render(`
                ${renderStepHeader(2, 4)}
                <h2 class="text-2xl font-bold text-slate-900 mb-6">Select Print Type</h2>
                
                <div class="relative mb-6">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Print Type</label>
                    <div id="print-type-dropdown" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer flex justify-between items-center hover:border-blue-300 transition-all" onclick="toggleCustomDropdown()">
                        <div class="flex items-center">
                            <span class="${selectedType ? 'text-slate-900 font-medium' : 'text-slate-400'}">${selectedType || 'Choose a print type...'}</span>
                            ${selectedType ? `
                                <div class="tooltip ml-2" onclick="event.stopPropagation()">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    <span class="tooltiptext">${PRINT_TYPE_INFO[selectedType]}</span>
                                </div>
                            ` : ''}
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                    
                    <div id="dropdown-options" class="hidden absolute z-50 w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden fade-in">
                        ${availableTypes.map(type => `
                            <div onclick="selectPrintType('${type}')" class="p-4 hover:bg-blue-50 flex flex-col group transition-colors border-b border-slate-50 last:border-0 dropdown-option">
                                <div class="flex items-center mb-1">
                                    <div class="w-4 h-4 rounded-full border-2 ${selectedType === type ? 'border-blue-600 bg-blue-600' : 'border-slate-300'} mr-3 flex items-center justify-center shrink-0">
                                        ${selectedType === type ? '<div class="w-1.5 h-1.5 bg-white rounded-full"></div>' : ''}
                                    </div>
                                    <span class="font-bold ${selectedType === type ? 'text-blue-600' : 'text-slate-700'}">${type}</span>
                                </div>
                                <div class="pl-7 text-xs text-slate-500 leading-relaxed">
                                    ${PRINT_TYPE_INFO[type] || ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <button onclick="renderPrintingStep3()" ${!selectedType ? 'disabled' : ''} class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors mt-4 shadow-lg shadow-blue-200 disabled:opacity-50 disabled:shadow-none disabled:cursor-not-allowed">
                    Next
                </button>
            `);
        }

        function toggleCustomDropdown() {
            const options = document.getElementById('dropdown-options');
            options.classList.toggle('hidden');
        }

        function selectPrintType(type) {
            state.selections.printType = type;
            renderPrintingStep2(getAvailablePrintTypes(state.selections.product));
        }

        function getAvailablePrintTypes(productName) {
            const pObj = state.data.printing.find(p => p.product === productName);
            const types = [];
            if (pObj.solvent) types.push('Solvent');
            if (pObj.ecoSolvent) types.push('Eco Solvent');
            if (pObj.latex) types.push('Latex');
            if (pObj.uv) types.push('UV');
            return types;
        }

        function renderPrintingStep3() {
            state.step = 3;
            const pObj = state.data.printing.find(p => p.product === state.selections.product);
            
            // Products that specifically use sq inch as per user request
            const currentProduct = state.selections.product.toLowerCase().trim();
            const unit = pObj.rateSqinch ? 'sqinch' : 'sqft';
            state.selections.unit = unit;

            render(`
                ${renderStepHeader(3, 4)}
                <h2 class="text-2xl font-bold text-slate-900 mb-6">Enter Dimensions</h2>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Width (${unit === 'sqinch' ? 'Inches' : 'Feet'})</label>
                            <div class="relative">
                                <input type="number" id="width-input" value="${state.selections.width || ''}" placeholder="0" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-xl font-bold text-slate-800 transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Height (${unit === 'sqinch' ? 'Inches' : 'Feet'})</label>
                            <div class="relative">
                                <input type="number" id="height-input" value="${state.selections.height || ''}" placeholder="0" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-xl font-bold text-slate-800 transition-all">
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <p class="text-xs text-blue-600 font-medium leading-relaxed">
                            Total area will be calculated automatically. <br>
                            Current pricing unit: <span class="font-bold uppercase">${unit}</span>
                        </p>
                    </div>

                    <button onclick="calculatePrinting()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200">
                        Calculate
                    </button>
                </div>
            `);
        }

        function calculatePrinting() {
            const width = parseFloat(document.getElementById('width-input').value);
            const height = parseFloat(document.getElementById('height-input').value);
            
            if (!width || width <= 0 || !height || height <= 0) {
                if (!width || width <= 0) document.getElementById('width-input').classList.add('border-red-500');
                if (!height || height <= 0) document.getElementById('height-input').classList.add('border-red-500');
                return;
            }

            state.selections.width = width;
            state.selections.height = height;

            // Calculation: width * height gives the area in the current unit (sqft or sqinch)
            const size = width * height;
            state.selections.size = size;

            const pObj = state.data.printing.find(p => p.product === state.selections.product);
            let rate = 0;

            if (state.selections.unit === 'sqinch') {
                rate = pObj.rateSqinch;
            } else {
                const typeIndex = ['Solvent', 'Eco Solvent', 'Latex', 'UV'].indexOf(state.selections.printType);
                rate = pObj.rateSqft[typeIndex] || pObj.rateSqft[0] || 0;
            }

            state.result = {
                rate,
                total: rate * size
            };

            renderResult();
        }

        // --- COMMON RESULT PAGE ---

        function renderResult() {
            state.step = 4;
            const isPrinting = true; // Only printing now
            
            render(`
                <div class="py-4 fade-in max-w-3xl mx-auto">
                    <!-- Main Price Card -->
                    <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-2xl mb-8">
                        <div class="bg-slate-900 p-10 text-center relative overflow-hidden">
                            <!-- Background Pattern -->
                            <div class="absolute inset-0 opacity-10 pointer-events-none">
                                <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                                    <defs>
                                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/>
                                        </pattern>
                                    </defs>
                                    <rect width="100%" height="100%" fill="url(#grid)" />
                                </svg>
                            </div>
                            
                            <span class="relative z-10 text-blue-400 font-bold uppercase tracking-[0.2em] text-[10px]">Investment Estimate</span>
                            <div class="relative z-10 text-6xl font-black text-white mt-4 tracking-tighter">₹${state.result.total.toLocaleString('en-IN')}</div>
                            <div class="relative z-10 inline-flex items-center mt-6 px-4 py-1.5 bg-white/10 rounded-full text-white/90 text-[10px] font-bold uppercase tracking-wider backdrop-blur-md border border-white/10">
                                <span class="w-2 h-2 bg-emerald-400 rounded-full mr-2 animate-pulse"></span>
                                Estimated Project Total
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 bg-slate-50/50">
                            <div class="p-8 text-center border-r border-slate-100">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Unit Pricing</span>
                                <div class="text-2xl font-bold text-slate-800 mt-2">₹${state.result.rate}/${state.selections.unit}</div>
                                <p class="text-[10px] text-slate-400 mt-1 font-medium italic">Standard Industry Rate</p>
                            </div>
                            <div class="p-8 text-center">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Area</span>
                                <div class="text-2xl font-bold text-slate-800 mt-2">
                                    ${state.selections.size.toFixed(2)} ${state.selections.unit}
                                </div>
                                <p class="text-[10px] text-slate-400 mt-1 font-medium italic">Calculated from dimensions</p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-8">
                        <!-- Configuration Summary -->
                        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
                            <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-100">
                                <h4 class="text-xs font-black text-slate-900 uppercase tracking-widest">Technical Specifications</h4>
                                <span class="px-2.5 py-1 bg-blue-50 text-blue-600 text-[9px] font-black rounded-md uppercase tracking-tighter border border-blue-100">Printing</span>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-10 gap-y-6">
                                <div class="flex flex-col">
                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Product Line</span>
                                    <span class="text-slate-800 font-bold text-sm leading-tight">${state.selections.product}</span>
                                </div>
                                ${state.selections.printType ? `
                                <div class="flex flex-col">
                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Print Technology</span>
                                    <span class="text-slate-800 font-bold text-sm leading-tight">${state.selections.printType}</span>
                                </div>
                                ` : ''}
                                <div class="flex flex-col">
                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Dimensions</span>
                                    <span class="text-slate-800 font-bold text-sm leading-tight">${state.selections.width}${state.selections.unit === 'sqft' ? "'" : '"'} × ${state.selections.height}${state.selections.unit === 'sqft' ? "'" : '"'}</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Coverage</span>
                                    <span class="text-slate-800 font-bold text-sm leading-tight">${state.selections.size.toFixed(2)} ${state.selections.unit}</span>
                                </div>
                            </div>
                            
                            <div class="mt-8 pt-6 border-t border-slate-100">
                                <p class="text-[10px] text-slate-400 leading-relaxed italic">
                                    * Final pricing subject to site survey and artwork complexity. All materials used are of premium grade.
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex flex-col sm:flex-row gap-4">
                        <button onclick="downloadEstimate()" class="flex-2 py-5 bg-blue-600 text-white font-black uppercase tracking-widest text-xs rounded-2xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-200 flex items-center justify-center group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3 group-hover:translate-y-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            Download Estimate
                        </button>
                        <button onclick="renderHome()" class="flex-1 py-5 bg-white border border-slate-200 text-slate-600 font-black uppercase tracking-widest text-xs rounded-2xl hover:bg-slate-50 transition-colors shadow-sm">
                            New Estimate
                        </button>
                    </div>
                </div>
            `);
        }

        // PDF Generation
        function downloadEstimate() {
            const doc = new jsPDF();
            const isPrinting = state.mode === 'printing';
            const date = new Date().toLocaleDateString();

            // Header - Dark Theme
            doc.setFillColor(15, 23, 42); // slate-900
            doc.rect(0, 0, 210, 50, 'F');
            
            doc.setFontSize(28);
            doc.setTextColor(255, 255, 255);
            doc.setFont('helvetica', 'bold');
            doc.text('UAMS Designs', 20, 32);
            
            doc.setFontSize(10);
            doc.setTextColor(148, 163, 184); // slate-400
            doc.setFont('helvetica', 'normal');
            doc.text('OFFICIAL PROJECT ESTIMATE', 145, 25);
            doc.text(`REF: SA-${Math.floor(Math.random() * 900000) + 100000}`, 145, 32);
            doc.text(`DATE: ${date}`, 145, 39);

            // Client/Project Title
            doc.setTextColor(15, 23, 42);
            doc.setFontSize(18);
            doc.setFont('helvetica', 'bold');
            doc.text('Custom Printing Estimate', 20, 70);
            
            doc.setDrawColor(37, 99, 235); // blue-600
            doc.setLineWidth(1);
            doc.line(20, 75, 40, 75);

            // Scope of Work
            doc.setFontSize(12);
            doc.setTextColor(15, 23, 42);
            doc.text('Scope of Work', 20, 90);
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(71, 85, 105);
            const scopeText = `Supply and fabrication of custom ${state.selections.product} using ${state.selections.printType || 'standard'} printing technology. Dimensions specified as ${state.selections.width}${state.selections.unit === 'sqft' ? "'" : '"'} x ${state.selections.height}${state.selections.unit === 'sqft' ? "'" : '"'}.`;
            doc.text(doc.splitTextToSize(scopeText, 170), 20, 97);

            // Technical Specifications Table
            doc.setFillColor(248, 250, 252); // slate-50
            doc.rect(20, 115, 170, 10, 'F');
            doc.setFontSize(9);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(100, 116, 139);
            doc.text('SPECIFICATION PARAMETER', 25, 121.5);
            doc.text('VALUE / DESCRIPTION', 100, 121.5);

            let y = 133;
            const addDetail = (label, value) => {
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(100, 116, 139);
                doc.text(label.toUpperCase(), 25, y);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(15, 23, 42);
                doc.text(String(value), 100, y);
                y += 8;
                doc.setDrawColor(241, 245, 249);
                doc.setLineWidth(0.2);
                doc.line(20, y-2, 190, y-2);
                y += 4;
            };

            addDetail('Product Line', state.selections.product);
            if (state.selections.printType) addDetail('Print Technology', state.selections.printType);
            addDetail('Dimensions', `${state.selections.width}${state.selections.unit === 'sqft' ? "'" : '"'} × ${state.selections.height}${state.selections.unit === 'sqft' ? "'" : '"'}`);
            addDetail('Total Area', `${state.selections.size.toFixed(2)} ${state.selections.unit}`);
            addDetail('Unit Rate', `₹${state.result.rate}/${state.selections.unit}`);

            // Summary Section
            y += 10;
            doc.setFillColor(15, 23, 42);
            doc.rect(110, y, 80, 40, 'F');
            
            doc.setTextColor(148, 163, 184);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            doc.text('TOTAL ESTIMATED INVESTMENT', 120, y + 15);
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text(`₹${state.result.total.toLocaleString('en-IN')}`, 120, y + 30);

            // Terms & Conditions
            y = 215;
            doc.setFontSize(10);
            doc.setTextColor(15, 23, 42);
            doc.setFont('helvetica', 'bold');
            doc.text('Terms & Conditions', 20, y);
            
            doc.setFontSize(7.5);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(100, 116, 139);
            const terms = [
                '1. This estimate is based on the specifications provided and is subject to site survey.',
                '2. Payment Terms: 50% advance for project initiation, 50% upon completion.',
                '3. Taxes, transportation, and installation charges are extra as per actuals.',
                '4. This proposal is valid for a period of 15 days from the date of issue.'
            ];
            terms.forEach((term, i) => {
                doc.text(term, 20, y + 7 + (i * 5));
            });

            // Acceptance Signature
            y = 255;
            doc.setDrawColor(203, 213, 225);
            doc.line(20, y + 15, 80, y + 15);
            doc.line(130, y + 15, 190, y + 15);
            
            doc.setFontSize(8);
            doc.text('Authorized Signatory', 20, y + 22);
            doc.text('Client Acceptance', 130, y + 22);

            doc.save(`Estimate_PRINT_${date.replace(/\//g, '-')}.pdf`);
        }

        // Start the app
        init();
    </script>
</body>
</html>
